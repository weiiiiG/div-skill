<!DOCTYPE html>
<html>
<head><title>My App</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:sans-serif}
.nav{height:56px;background:#1a1a2e;display:flex;align-items:center;padding:0 24px;color:#fff}
.nav h2{font-size:18px}
.badge{background:#ef4444;color:#fff;font-size:12px;padding:2px 8px;border-radius:10px;margin-left:auto;display:none}
.wrap{display:flex;min-height:calc(100vh - 56px)}
.side{width:220px;background:#f8fafc;padding:20px;border-right:1px solid #e2e8f0;flex-shrink:0}
.side a{display:block;padding:10px 12px;color:#475569;cursor:pointer;border-radius:6px;margin-bottom:4px}
.side a:hover{background:#e2e8f0}
.side a.active{background:#6366f1;color:#fff}
.main{flex:1;padding:24px}
.card{background:#fff;border:1px solid #e2e8f0;border-radius:8px;padding:20px;margin-bottom:16px}
.card h3{font-size:14px;color:#64748b;margin-bottom:8px}
.card .count{font-size:36px;font-weight:700;color:#0f172a}
.card button{background:#6366f1;color:#fff;border:none;padding:8px 20px;border-radius:6px;cursor:pointer;font-size:14px;margin-top:12px}
.card button:hover{background:#4f46e5}
.page{display:none}
.page.active{display:block}
</style></head>
<body>
<div class="nav"><h2>MyApp</h2><span class="badge" id="badge">0</span></div>
<div class="wrap">
<div class="side" id="sidebar">
<a class="active" data-page="dashboard">Dashboard</a>
<a data-page="settings">Settings</a>
<a data-page="about">About</a>
</div>
<div class="main">
<div id="page-dashboard" class="page active">
<div class="card"><h3>Counter</h3><div class="count" id="count">0</div><button id="increment">+1</button></div>
<div class="card"><h3>Status</h3><p id="status-text">Ready. Click +1 to start.</p></div>
</div>
<div id="page-settings" class="page"><div class="card"><h3>Settings</h3><p>Settings content here.</p></div></div>
<div id="page-about" class="page"><div class="card"><h3>About</h3><p>About content here.</p></div></div>
</div></div>
<script>
let count = 0, currentPage = 'dashboard';
const countEl = document.getElementById('count'), badgeEl = document.getElementById('badge');
const statusEl = document.getElementById('status-text'), btn = document.getElementById('increment');
function updateCount() {
  count++; countEl.textContent = count;
  badgeEl.textContent = count; badgeEl.style.display = count > 0 ? 'inline' : 'none';
  statusEl.textContent = count === 1 ? 'Clicked once!' : 'Clicked ' + count + ' times!';
}
btn.addEventListener('click', updateCount);
document.querySelectorAll('.side a').forEach(function(link) {
  link.addEventListener('click', function() {
    document.querySelectorAll('.side a').forEach(function(a) { a.classList.remove('active'); });
    this.classList.add('active'); currentPage = this.dataset.page;
    document.querySelectorAll('.page').forEach(function(p) { p.classList.remove('active'); });
    document.getElementById('page-' + currentPage).classList.add('active');
  });
});
</script>
</body>
</html>
