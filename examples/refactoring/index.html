<!DOCTYPE html>
<html>
<head><title>My App - Refactored</title>
<link rel="stylesheet" href="pages/home.css">
<link rel="stylesheet" href="components/NavBar.css">
<link rel="stylesheet" href="components/Sidebar.css">
<link rel="stylesheet" href="components/Card.css">
</head>
<body>
<div id="app">
<div id="app-inner">
<div class="nav"><div class="nav-inner"><h2>MyApp</h2><span class="badge" id="badge">0</span></div></div>
<div class="wrap"><div class="wrap-inner">
<div class="side" id="sidebar"><div class="side-inner">
<a class="active" data-page="dashboard">Dashboard</a>
<a data-page="settings">Settings</a>
<a data-page="about">About</a>
</div></div>
<div class="main"><div class="main-inner">
<div id="page-dashboard" class="page active">
<div class="card"><div class="card-inner"><h3>Counter</h3><div class="count" id="count">0</div><button id="increment">+1</button></div></div>
<div class="card"><div class="card-inner"><h3>Status</h3><p id="status-text">Ready. Click +1 to start.</p></div></div>
</div>
<div id="page-settings" class="page"><div class="card"><div class="card-inner"><h3>Settings</h3><p>Settings content here.</p></div></div></div>
<div id="page-about" class="page"><div class="card"><div class="card-inner"><h3>About</h3><p>About content here.</p></div></div></div>
</div></div>
</div></div>
</div></div>
<script>
let count = 0, currentPage = 'dashboard';
const countEl = document.getElementById('count'), badgeEl = document.getElementById('badge');
const statusEl = document.getElementById('status-text'), btn = document.getElementById('increment');
function updateCount() {
  count++; countEl.textContent = count;
  badgeEl.textContent = count; badgeEl.style.display = count > 0 ? 'inline' : 'none';
  statusEl.textContent = count === 1 ? 'Clicked once!' : 'Clicked ' + count + ' times!';
}
btn.addEventListener('click', updateCount);
document.querySelectorAll('.side a').forEach(function(link) {
  link.addEventListener('click', function() {
    document.querySelectorAll('.side a').forEach(function(a) { a.classList.remove('active'); });
    this.classList.add('active'); currentPage = this.dataset.page;
    document.querySelectorAll('.page').forEach(function(p) { p.classList.remove('active'); });
    document.getElementById('page-' + currentPage).classList.add('active');
  });
});
</script>
</body>
</html>
