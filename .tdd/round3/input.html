<!DOCTYPE html>
<html><head><title>R3 - Inline + Position</title>
<style>
*{margin:0;padding:0}
body{background:#f0f2f5;font-family:sans-serif}
.wrap{position:relative;min-height:500px}
.sidebar{position:absolute;left:0;top:0;width:250px;height:100%;background:#1e293b;color:#fff;padding:20px}
.sidebar a{display:block;color:#94a3b8;padding:10px;margin-bottom:4px}
.main{margin-left:250px;padding:24px}
.header{background:#fff;border-bottom:1px solid #ddd;padding:16px 24px;margin-bottom:24px}
.header h1{font-size:20px;color:#0f172a}
.float-card{float:left;width:30%;background:#fff;border:1px solid #ddd;border-radius:8px;padding:16px;margin-right:2%}
.float-card h3{margin-bottom:8px}
.clear{clear:both}
</style></head>
<body>
<div class="wrap">
<div class="sidebar"><a>Dash</a><a>Reports</a><a>Settings</a></div>
<div class="main">
<div class="header"><h1 style="color:#0f172a">Dashboard</h1></div>
<div style="margin-bottom:20px">
<div class="float-card"><h3>Revenue</h3><p>$48k</p></div>
<div class="float-card"><h3>Users</h3><p>2.8k</p></div>
<div class="float-card" style="margin-right:0"><h3>Orders</h3><p>1.4k</p></div>
<div class="clear"></div>
</div>
<table style="width:100%;border-collapse:collapse">
<tr><th style="padding:12px;text-align:left;background:#f8fafc">Name</th><th style="padding:12px;text-align:left">Status</th></tr>
<tr><td style="padding:12px;border-bottom:1px solid #eee">Alice</td><td style="padding:12px;border-bottom:1px solid #eee">Active</td></tr>
</table>
</div></div></body></html>
