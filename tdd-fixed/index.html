<!DOCTYPE html>
<html><head><title>Test</title>
<link rel="stylesheet" href="pages/home.css">
<link rel="stylesheet" href="components/Sidebar.css">
<link rel="stylesheet" href="components/Card.css">
<link rel="stylesheet" href="components/DataTable.css">
</head><body>
<div class="root">                <!-- 外层：全屏容器 -->
  <div class="wrap">             <!-- 内层：flex 划分空间 -->
    <aside class="sidebar">      <!-- 子容器：侧栏 -->
      <div class="sidebar-body">Sidebar</div>
    </aside>
    <main class="main">          <!-- 子容器：主内容区 -->
      <article class="card">     <!-- 外层：卡片背景 -->
        <div class="card-body">This box is 900px wide</div>
      </article>
      <div class="data-table-wrapper"><!-- 外层：表格溢出保护 -->
        <table class="data-table"><!-- 内层：表格固定布局 -->
          <tr><td>Long unbreakable text content that should not overflow</td></tr>
        </table>
      </div>
    </main>
  </div>
</div>
</body></html>
